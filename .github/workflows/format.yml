name: Format Check

on:
  push:
    branches-ignore:
      - 'gh-pages'
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Black
        run: pip install "black>=22.0"

      - name: Check formatting
        run: black --check .
